definitions:
  model.Poi:
    properties:
      id:
        type: integer
      lat:
        type: number
      lon:
        type: number
      name:
        type: string
      status:
        type: integer
      tybe:
        type: integer
    type: object
  result.Result:
    properties:
      code:
        description: 1表示业务成功 2表示业务失败
        type: integer
      data: {}
      message:
        type: string
    type: object
info:
  contact: {}
  title: Mover API
  version: "1.0"
paths:
  /pois:
    get:
      consumes:
      - application/json
      parameters:
      - description: poi 名称
        in: query
        name: name
        type: string
      - description: poi 类型
        in: query
        name: tybe
        type: integer
      - description: poi 状态
        in: query
        name: status
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/result.Result'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/model.Poi'
                  type: array
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/result.Result'
      summary: 筛选 / 获取 poi 列表
      tags:
      - Poi
swagger: "2.0"
